<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/radial.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuViCo</title>

  <style>
    .edit-mode-workspace {
      display: flex;
      flex-direction: column;
      gap: 1rem;

    }
      .edit-mode-workspace > div {
      align-items: center;
      gap: 12px;
      background-color: #312238;
      outline: 2px solid #572b6e;
      border-radius: 8px;

    }

    .cue-editor-form {
      display: flex !important;
      flex-grow: 0;
      overflow: hidden !important;
      padding:1rem;
    }

    .edit-mode-timeline{
      padding:1rem;

    }

    .cue-editor-form {
      width: 100%;

      form {
        width: 100%;

      }
    }

    @media (min-width: 1200px) {
      .force-no-resize {
        width: 20rem !important;
      }

      .edit-mode-workspace {
        flex-direction: row;

        .cue-editor-form {
          form {
            width: 20rem;
          }
        }
      }

      .edit-workspace {
        /* width: calc(100% - 36rem) !important; */
      }
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/client/main.jsx"></script>
</body>

</html>
