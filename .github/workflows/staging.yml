name: Test and deploy to staging

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-username: "testing"
          mongodb-password: "testing"
          mongodb-db: "test"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: |
          npm run test-all
        env:
          TEST_MONGODB_URI: "mongodb://testing:testing@localhost/test"
          PUBLIC_S3_ENDPOINT: ${{ secrets.UPCLOUD_ENDPOINT }}
          BUCKET_NAME: ${{ secrets.UPCLOUD_BUCKET }}
          BUCKET_REGION: ${{ secrets.UPCLOUD_REGION }}
          ACCESS_KEY: ${{ secrets.UPCLOUD_ACCESS_KEY }}
          SECRET_ACCESS_KEY: ${{ secrets.UPCLOUD_SECRET_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
          SECRET: ${{ secrets.SECRET }}

      - name: Upload frontend & backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/frontend/lcov.info,coverage/backend/lcov.info

  build-to-quay:
    needs: test
    if: ${{ github.ref == 'refs/heads/main'}}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build, tag, and push image to Quay.io
        id: build-image
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          docker login quay.io -u muvico_hy+robo -p ${{ secrets.QUAY_IO_TOKEN }}
          docker build \
            --build-arg VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN \
            --build-arg VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID \
            --build-arg VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID \
            -t 'quay.io/muvico_hy/muvico:staging' .
          docker push 'quay.io/muvico_hy/muvico:staging'
          echo "image=quay.io/muvico_hy/muvico:staging" >> $GITHUB_OUTPUT
